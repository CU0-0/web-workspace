<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습 연습!</title>

    <style>
        div, header, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
            
            display: flex;
            flex-direction: column;
        }

        header, footer{
            flex: 3;
        }
        main{
            flex: 4;
        }
    </style>
</head>
<body>
    
    <!--#wrap>header+main+footer-->
    <div id="wrap">
        <header></header>
        <main></main>
        <footer></footer>
    </div>








    <br><br><br><br><br><br><br><br><br><br>
</body>
</html>
