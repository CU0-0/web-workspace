<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            border: 1px solid red;
            box-sizing: border-box;
        }

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
        }
        #wrap > div{
            width: 100%;
        }
        #header, #footer{
            height: 200px;
            height: 25%;
        }
        #main{
            height: 400px;
            height: 50%;
        }
        /*
        footer{
            height: 200px;
        }*/
    </style>
    
</head>
<body>

    <!--#wrap>#header+#main+#footer-->
    <div id="wrap">
        <div id="header"></div>
        <div id="main"></div>
        <div id="footer"></div>
    </div>














    <br><br><br><br><br><br><br><br><br><br>
</body>
</html>
