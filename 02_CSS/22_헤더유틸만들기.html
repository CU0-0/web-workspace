<!DOCTYPE html>
<html lang="en">
<head>
    <title>간단하게</title>
     <style>
        div{
            border: 1px solid red;
        }
        #header_3{
            width: 150px;
            height: 160px;
        }

        /*--------------------------------------------------------*/

        #header_3{
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        #util{
            display: flex;
            flex-direction: column;
            padding-right: 12px;
        }
        #util>a{
            color: #cecece;
            text-decoration: none;/*하이퍼링크 밑줄지우기*/

            &:hover{
                color: #1a1a1a;
                font-weight: 600;
            }
        }



     </style>
</head>
<body>
    <div id="header_3">
        <div id="util">
            <a href="#">회원가입</a>
            <a href="#">로그인</a>
            <a href="#">장바구니</a>
        </div>
    </div>
</body>
</html>
