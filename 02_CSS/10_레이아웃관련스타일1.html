<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1번입니다</title>

    <style>
        .size-test{
            border: 10px solid brown;
            height: 200px;
            background: rgb(94, 255, 94);
        }

        #test1{
            width: 40%;
        }
        #test2{
            width: 400px;
        }

        .nemo{
            width: 150px;
            height: 150px;
            border: 1px solid black;
        }

        .red{
            background : red;
        }
        .cyan{
            background : cyan
        }
        .orange{
            background : orange;
        }
        .orangered{
            background : orangered;
        }
        .pink{
            background: pink;
        }

        .inline{
            display: inline;
        }

        .id{
            display: inline-block;
        }
    </style>
</head>
<body>
    <!--
        블럭요소    : 한 줄 단위로 영역이 잡힘
        인라인요소  : content크기 만큼만 영역이 잡힘
    -->

    <h3>width, height</h3>

    <p>content영역의 크기를 조절하는 속성</p>

    <!--#size>#test$.size-test*2-->
    <div id="size">
        <div id="test1" class="size-test"></div>
        <div id="test2" class="size-test"></div>
    </div>

    <hr>

    <h2>display : 화면 배치 방법 변경</h2>

    <pre>
        선택자{
            display : inline / block / inline-block / hidden / flex
                      / table-cell / ...

        }
    </pre>



    <p>기본 !</p>
    <div class="nemo red">1</div>
    <div class="nemo cyan">2</div>
    <div class="nemo orange">3</div>
    <div class="nemo orangered">4</div>
    <div class="nemo pink">5</div>

    <hr>

    <p>inline</p>
    <div class="nemo inline red">1</div>
    <div class="nemo inline cyan">2</div>
    <div class="nemo inline orange">3</div>
    <div class="nemo inline orangered">4</div>
    <div class="nemo inline pink">5</div>

    <strong>display : inline == width, height속성 적용 X </strong>

    <hr>

    <div class="nemo id red">1</div
    ><div class="nemo id cyan">2</div>
    <div class="nemo id orange">3</div><!--
    --><div class="nemo id orangered">4</div>
    <div class="nemo id pink">5</div>
















    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
