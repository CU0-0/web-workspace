<!DOCTYPE html>
<html lang="en">
<head>
    <title>메인영역2</title>
    <style>
        div{
            border: 1px solid red;
            box-sizing: border-box;
        }
        #content_2{
            width: 600px;
            height: 440px;
        }

        /*-----------------------------------------------------*/

        #content_2{
            display: flex;
            flex-direction: column;
        }
        #hero{
            flex: 1;
            background-color: #1a1a1a;
            color: #fafafa;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 100px;
            border-radius: 13px;
        }
        #hero-tag{
            font-size: 12px;
            font-weight: 600;
            color: rgb(255,64,64);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #hero-title{
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        #hero-sub{
            color: #eeeeee;
            font-size: 13px;
        }
        #lect{
            flex: 1;
            background-color: #3f91b8;
            color: #fafafa;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 100px;
            border-radius: 13px;
            
        }
        #hero-tag2{
            font-size: 12px;
            font-weight: 600;
            color: rgb(202, 255, 80);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #hero-title2{
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #1a1a1a;
        }
        #hero-sub2{
            color: #f1f1f1;
            font-size: 13px;
        }

    </style>
</head>
<body>
    <!--#content_2>#hero+#lect-->
    <div id="content_2">
        <div id="hero">
            <div id="hero-tag">NEW!! 신상 강의</div>
            <div id="hero-title">501강의실의 CSS구조잡기!!</div>
            <div id="hero-sub">2026년 4월 한정!!</div>
        </div>
        <div id="lect">
            <div id="hero-tag2">현재 진행중!!</div>
            <div id="hero-title2">프로젝트 기반 AWS 풀스택 웹 개발자 양성!!</div>
            <div id="hero-sub2">2026년 3월 시작!!</div>
        </div>
    </div>
</body>
</html>
