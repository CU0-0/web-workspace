<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전!</title>
    <style>
        div, header, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }
        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }
        header{
            flex: 2;
            display: flex;
        }
        nav{
            flex: 0.5;
        }
        main{
            flex: 5.5;
            display: flex;
        }
        footer{
            flex: 2;
        }
        #header_1{
            flex: 2;
        }
        #header_2{
            flex: 6.5;
        }
        #header_3{
            flex: 1.5;
        }
        #content_1{
            flex: 1.5;
        }
        #content_2{
            flex: 6;
        }
        #content_3{
            flex: 2.5;
        }
    </style>
</head>
<body>
    <!--#wrap>(header>#header_$*3)+nav+(main>#content-$*3)+footer-->
    <div id="wrap">
        <header>
            <div id="header_1"></div>
            <div id="header_2"></div>
            <div id="header_3"></div>
        </header>
        <nav></nav>
        <main>
            <div id="content_1"></div>
            <div id="content_2"></div>
            <div id="content_3"></div>
        </main>
        <footer></footer>
    </div>

    <hr>
    <!--#wrap>(div>#aa$*4)+div+(div>div>#bb$*4)+div-->
    <div id="wrap">
        <div>
            <div id="aa1"></div>
            <div id="aa2"></div>
            <div id="aa3"></div>
            <div id="aa4"></div>
        </div>
        <div></div>
        <div>
            <div>
                <div id="bb1"></div>
                <div id="bb2"></div>
                <div id="bb3"></div>
                <div id="bb4"></div>
            </div>
        </div>
        <div></div>
    </div>






</body>
</html>
