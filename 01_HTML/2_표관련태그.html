    <title>2_표만들기~</title>
    <style>
        table{
            border: 1px solid red;
        }
    </style>

<body>
    <!--
        표(table) : row + cell로 구성됨
        많은 데이터를 정리해서 표현하고자 할때 사용

        표를 구성하는 요소 : <table>, <tr>, <th>, <td>
            + <thead>, <tbody>, <tfoot>
        
        table : 표를 하나 만들어주는 요소
        tr : 한 행을 나타내는 요소
        td : 일반 셀을 타나내는 요소

        th : 열의 제목셀을 나타내는 요소
        
    -->

    <table>

            <th colspan="2">제목</th>

            <th>작성일</th>
