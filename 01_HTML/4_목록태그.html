<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4_목록을 만들자</title>
</head>
<body>
    <!--
        <li> : 기본적인 목록을 만드는 태그
    -->
    우리 공부한 목록
    <li>Java</li>
    <li>SQL</li>
    <li>JDBC</li>
    <li>MyBatic</li>

    <h3>ul : 순서가 없는 목록을 사용할 때 쓰는 태그</h3>
    
    <ul>
        <li>HTML
            <ul>
                <li>글자관련태그</li>
                <li>목록태그</li>
            </ul>
        </li>
        <li>CSS</li>
        <li>JavaScipt</li>
        <li>React</li>
    </ul>

    <!--bullet기호 : 채워진원, 빈원, 네모네모, 내가쓰고싶은거-->

    <h3>ol : 순서가 있는 목록을 사용할 때 쓰는 태그</h3>

    <ol start="10" type="I">
        <li>목록</li>
        <li>목록</li>
        <li>목록</li>
    </ol>

    <h3>dl : 설명적을 때 쓰는 태그</h3>
    <dl>
        <dt>설명제목</dt>

        <dd>설명내용 1</dd>
        <dd>설명내용 2</dd>
        <dd>설명내용 3</dd>

    </dl>














    






























<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
