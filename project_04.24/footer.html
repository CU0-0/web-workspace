<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해리푸터???</title>

    <style>
        footer, div, p{
            border: 1px solid white;
            box-sizing: border-box;
        }
        footer{
            width: 1000px;
            height: 160px;
        }

        /* 위에는 냅두고 밑에 세부 스타일만 작성 */
        footer{
            background-color: #fafafa;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }

        #footer_1{
            border-bottom: 1px solid #fafafa;
            background: #eeeeee;
        }
        #footer_1>a{
            color: #1a1a1a;
            text-decoration: none;
            border-right: 1px solid #1a1a1a;
            margin-right: 16px;
            padding-right: 16px;
            font-size: 13px;
            font-weight: 600;
            line-height: 30px;

            &:hover{
                color: rgb(255, 64, 64);
            }
        }
        #footer_1>a:last-child{
            border-right: none;
        }
        #footer_2 p{
            margin: 0;
        }
        #p_1{
            font-size: 12px;
            color: #323232;
            padding-top: 12px;
            padding-bottom: 6px;
        }
        #p_2{
            font-size: 11px;
            color: #a5a5a5;
            padding: 8px;
        }


    </style>
</head>
<body>
    <footer>
        <div id="footer_1">
            <a href="#">이용약관</a>
            <a href="#">개인정보 처리방침</a>
            <a href="#">인개 채용 문의</a>
            <a href="#">훈련비 게시</a>
            <a href="#">강사 구인</a>
        </div>
        <div id="footer_2">
            <p id="p_1">
                KH정보교육원 ｜ 만든사람 : 지세웅 ｜ 책임자 : 이승철 ｜ 개인정보관리책임자 : 이승철
            </p>
            <p id="p_2">
                Copyright © 2026 KH 501 Class All Right Reserved
            </p>
        </div>
    </footer>
</body>
</html>
