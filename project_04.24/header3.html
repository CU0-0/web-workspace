<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #header_3, ul, li{
            border: 1px solid red;
            box-sizing: border-box;
        }
        #header_3{
            width: 500px;
            height: 150px;
        }

        /*-------------------------------------------------*/
        #navbar{
            margin: 0;
            padding: 0;
            list-style: none;
            height: 100%;
            font-family: 돋움체;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #navbar>li{
            float: left;
            height: 100%;
            width: 25%;
            text-align: center;
            
        }
        #navbar>li a{
            text-decoration: none;
            color: #1a1a1a;
            line-height: 40px;
            font-weight: 800;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #navbar>li>ul{
            list-style: none;
            padding: 0;
            display: none;
        }

        #navbar>li>a:hover + ul{
            display: block;
            font-size: 15px;
        }
        #navbar>li>ul:hover{
            display: block;
            font-size: 15px;
        }
        #navbar>li>ul a:hover{
            background: #f1dcdc;
        }
    </style>
</head>
<body>
    <div id="header_3">
        <ul id="navbar">
            <li>
                <a href="#">정보</a>
                <ul>
                    <li><a href="#">유저 정보</a></li>
                    <li><a href="#">게임 정보</a></li>
                </ul>
                
            </li>
            <li>
                <a href="#">게시판</a>
                <ul>
                    <li><a href="#">사진 게시판</a></li>
                    <li><a href="#">동영상 게시판</a></li>
                    <li><a href="#">동영상 게시판</a></li>
                </ul>
            </li>
            <li>
                <a href="#">커뮤니티</a>
            </li>
            <li>
                <a href="#">문의하기</a>
            </li>
        </ul>
    </div>
</body>
</html>
