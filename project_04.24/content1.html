<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #content_1, ul, li{
            border : 1px solid red;
            box-sizing : border-box;
            
        }

        #content_1{
            width: 200px;
            height: 600px;
            
        }
        /*-------------------------------------------*/

        #content_1{
            border-top: 1px solid #eeeeee;
            border-bottom: 1px solid #eeeeee;
            
        }
        #navbar2{
            margin: 0;
            padding: 0;
            list-style: none;
            height: 100%;
            display: block;
            
            
        }
        #navbar2>li{
            padding: 20px 30px;

            &:hover{
                border-radius: 15px;
                background-color: rgb(188, 247, 255);
                
            }
        }
        #navbar2>li>a{
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: 4px;

            &:hover{
                color: #8d8d8d;
            }
        }
    </style>
</head>
<body>
    <div id="content_1">
        <ul id="navbar2">
            <li><a href="#">게임 할인 정보</a></li>
            <li><a href="#">카테고리</a></li>
            <li><a href="#">게임 뉴스</a></li>
            <li><a href="#">추천 게임</a></li>
            <li><a href="#">찜 목록</a></li>
        </ul>
    </div>
</body>
</html>
